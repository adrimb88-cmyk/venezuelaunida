<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Venezuela Unida</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="flag-stripe"><div class="f1"></div><div class="f2"></div><div class="f3"></div></div>

<header>
  <div class="header-inner">
    <div class="logo">Venezuela <span>Unida</span> <span class="admin-badge">Admin</span></div>
    <div class="header-actions" id="admin-header-actions">
      <a href="index.html" class="btn btn-sm">← Web pública</a>
    </div>
  </div>
</header>

<!-- LOGIN -->
<div id="login-section" class="login-wrap">
  <div class="login-card">
    <h2>Panel de administración</h2>
    <p class="sub">Acceso solo para verificadores</p>
    <div id="login-error" class="error-msg hidden"></div>
    <div class="form-group">
      <label for="login-user">Usuario</label>
      <input type="text" id="login-user" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="login-pass">Contraseña</label>
      <input type="password" id="login-pass" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div style="display:flex;gap:8px;margin-top:1rem;">
      <button class="btn btn-primary" style="flex:1;" onclick="doLogin()">Entrar</button>
      <a href="index.html" class="btn" style="flex:1;text-align:center;">Volver</a>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-section" class="admin-wrap hidden">

  <div class="admin-header">
    <div>
      <h2>Panel de administración</h2>
      <p class="sub" id="session-info"></p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn" id="btn-add-admin" onclick="openAddAdmin()" style="display:none;">+ Agregar admin</button>
      <button class="btn btn-danger btn-sm" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab active" onclick="setAdminTab(this,'pendientes')">⏳ Pendientes <span class="tab-count" id="count-pendientes"></span></button>
    <button class="admin-tab" onclick="setAdminTab(this,'verificado')">✅ Verificados <span class="tab-count" id="count-verificado"></span></button>
    <button class="admin-tab" onclick="setAdminTab(this,'rechazado')">❌ Rechazados <span class="tab-count" id="count-rechazado"></span></button>
    <button class="admin-tab" id="tab-admins" onclick="setAdminTab(this,'admins')" style="display:none;">👤 Admins</button>
  </div>

  <div id="admin-tab-content"></div>

</div>

<!-- MODAL -->
<div id="overlay" class="overlay hidden" onclick="overlayClick(event)">
  <div class="modal" id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="admin.js"></script>
</body>
</html>
